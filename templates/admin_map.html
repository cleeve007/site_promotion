<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    :root{--bg:#0b1220;--panel:rgba(255,255,255,.08);--line:rgba(255,255,255,.14);--text:#eaf0ff;--muted:rgba(234,240,255,.75)}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0b1220,#050817);color:var(--text)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.20);backdrop-filter:blur(8px)}
    .btn{display:inline-flex;gap:10px;align-items:center;justify-content:center;padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.10);font-weight:900;color:inherit;text-decoration:none}
    .muted{color:var(--muted)}
    #map{height:calc(100vh - 58px);width:100%}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <strong>Admin — Map</strong>
      <span class="muted">({{ points|length }} points)</span>
    </div>
    <div style="display:flex;gap:10px">
      <a class="btn" href="{{ url_for('admin_list') }}">Liste</a>
      <a class="btn" href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const points = {{ points|tojson }};

    const map = L.map('map');

    // Base layers
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    osm.addTo(map);

    // Overlay: submissions
    const submissionsLayer = L.layerGroup().addTo(map);
    const markers = [];

    points.forEach((p) => {
      const marker = L.marker([p.y, p.x]).addTo(submissionsLayer);
      markers.push(marker);

      const html = `
        <div style="font-family: system-ui; font-size: 14px; line-height: 1.3">
          <div style="font-weight: 800; margin-bottom: 6px;">${p.adresse || ''}</div>
          <div style="color: #444; margin-bottom: 6px;">
            ${p.city || ''} ${p.zipcode || ''}
          </div>
          <div><b>Nom:</b> ${p.nom || ''}</div>
          <div><b>Email:</b> ${p.email || ''}</div>
          <div><b>Tél:</b> ${p.telephone || ''}</div>
          <div><b>Prix:</b> ${p.prix ?? ''}</div>
          <div style="margin-top: 6px; color:#555">${p.description || ''}</div>
        </div>
      `;

      marker.bindPopup(html);
    });

    // Overlay: PLU zones (GPU zone-urba)
    const pluZonesLayer = L.geoJSON(null, {
      style: (feature) => {
        const t = (feature.properties || {}).typezone;
        const color = (t === 'U') ? '#22c55e' : (t === 'AU' ? '#f59e0b' : '#7c5cff');
        return { color, weight: 1, fillColor: color, fillOpacity: 0.18 };
      },
      onEachFeature: (feature, layer) => {
        const p = feature.properties || {};
        const title = `${p.typezone || ''} ${p.libelle || ''}`.trim();
        layer.bindPopup(`<b>${title || 'Zone'}</b><br>IDURBA: ${p.idurba || ''}`);
      }
    });

    // Overlay: Cadastre parcels
    const cadastreLayer = L.geoJSON(null, {
      style: () => ({ color: '#38bdf8', weight: 1, fillColor: '#38bdf8', fillOpacity: 0.10 }),
      onEachFeature: (feature, layer) => {
        const p = feature.properties || {};
        const cont = p.contenance ?? p.surface ?? p.area ?? '';
        const id = p.id || p.numero || '';
        layer.bindPopup(`<b>Parcelle</b><br>${id ? ('ID: ' + id + '<br>') : ''}${cont ? ('Contenance: ' + cont + ' m²') : ''}`);
      }
    });

    // Layer control
    const baseLayers = { 'OpenStreetMap': osm };
    const overlays = {
      'Submissions': submissionsLayer,
      'PLU (GPU) — zones U/AU': pluZonesLayer,
      'Cadastre — parcelles': cadastreLayer,
    };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

    // Commune search control (simple)
    const SearchControl = L.Control.extend({
      onAdd: function() {
        const div = L.DomUtil.create('div');
        div.style.background = 'rgba(0,0,0,.35)';
        div.style.backdropFilter = 'blur(8px)';
        div.style.border = '1px solid rgba(255,255,255,.14)';
        div.style.borderRadius = '14px';
        div.style.padding = '10px';
        div.style.color = '#eaf0ff';
        div.style.minWidth = '260px';

        div.innerHTML = `
          <div style="font-weight:900;margin-bottom:6px;">Couches APIcarto</div>
          <div class="muted" style="font-size:12px;margin-bottom:8px;">Commune → PLU (U/AU) + Cadastre</div>
          <div style="display:flex;gap:8px;">
            <input id="communeInput" placeholder="Commune (ex: Grenoble)" style="flex:1; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.10); color:#eaf0ff;" />
            <button id="loadPluBtn" title="Charger PLU" style="padding:10px 12px; border-radius:12px; border:0; background: linear-gradient(135deg,#7c5cff,#22c55e); font-weight:900; cursor:pointer;">PLU</button>
            <button id="loadCadBtn" title="Charger Cadastre" style="padding:10px 12px; border-radius:12px; border:0; background: rgba(255,255,255,.14); color:#eaf0ff; font-weight:900; cursor:pointer;">Cadastre</button>
          </div>
          <div id="pluStatus" style="margin-top:6px; font-size:12px; color: rgba(234,240,255,.75);"></div>
          <div id="cadStatus" style="margin-top:4px; font-size:12px; color: rgba(234,240,255,.75);"></div>
        `;

        L.DomEvent.disableClickPropagation(div);
        return div;
      }
    });

    map.addControl(new SearchControl({ position: 'topright' }));

    async function loadPluZones(commune) {
      const status = document.getElementById('pluStatus');
      status.textContent = 'PLU: chargement…';

      try {
        const url = new URL(window.location.origin + '/admin/api/plu/zone-urba');
        url.searchParams.set('commune', commune);
        url.searchParams.set('buildable', '1');
        const res = await fetch(url.toString());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        pluZonesLayer.clearLayers();
        pluZonesLayer.addData(data.data);
        pluZonesLayer.addTo(map);

        // Fit bounds
        const b = pluZonesLayer.getBounds();
        if (b.isValid()) map.fitBounds(b.pad(0.08));

        status.textContent = `PLU: OK — ${data.commune.nom} (${(data.data.features||[]).length} zones)`;
      } catch (e) {
        status.textContent = 'PLU: erreur de chargement';
      }
    }

    async function loadCadastreView() {
      const status = document.getElementById('cadStatus');
      status.textContent = 'Cadastre: chargement (bbox de la vue)…';

      try {
        const b = map.getBounds();
        const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(',');

        const url = new URL(window.location.origin + '/admin/api/cadastre/parcelle');
        url.searchParams.set('bbox', bbox);
        url.searchParams.set('samples', '25');

        const res = await fetch(url.toString());
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = (data && data.message) ? data.message : ('HTTP ' + res.status);
          throw new Error(msg);
        }

        cadastreLayer.clearLayers();
        cadastreLayer.addData(data.data);
        cadastreLayer.addTo(map);

        status.textContent = `Cadastre: OK — ~${data.featureCount || (data.data.features||[]).length} parcelles (échantillonnage)`;
      } catch (e) {
        status.textContent = 'Cadastre: ' + (e && e.message ? e.message : 'erreur de chargement');
      }
    }

    // Wire up buttons
    setTimeout(() => {
      const pluBtn = document.getElementById('loadPluBtn');
      const cadBtn = document.getElementById('loadCadBtn');
      const input = document.getElementById('communeInput');
      if (!pluBtn || !cadBtn || !input) return;

      pluBtn.addEventListener('click', () => {
        const c = (input.value || '').trim();
        if (!c) return;
        loadPluZones(c);
      });

      cadBtn.addEventListener('click', () => {
        // bbox of current view (no need for commune)
        loadCadastreView();
      });

      // Auto-reload cadastre when moving the map (if layer is enabled)
      let cadTimer = null;
      map.on('moveend', () => {
        if (!map.hasLayer(cadastreLayer)) return;
        if (cadTimer) clearTimeout(cadTimer);
        cadTimer = setTimeout(loadCadastreView, 350);
      });
    }, 0);

    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    } else {
      map.setView([46.5, 2.5], 6);
    }
  </script>
</body>
</html>
