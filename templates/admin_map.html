<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    :root{--bg:#0b1220;--panel:rgba(255,255,255,.08);--line:rgba(255,255,255,.14);--text:#eaf0ff;--muted:rgba(234,240,255,.75)}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0b1220,#050817);color:var(--text)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.20);backdrop-filter:blur(8px)}
    .btn{display:inline-flex;gap:10px;align-items:center;justify-content:center;padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.10);font-weight:900;color:inherit;text-decoration:none}
    .muted{color:var(--muted)}
    #map{height:calc(100vh - 58px);width:100%}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <strong>Admin — Map</strong>
      <span class="muted">({{ points|length }} points)</span>
    </div>
    <div style="display:flex;gap:10px">
      <a class="btn" href="{{ url_for('admin_list') }}">Liste</a>
      <a class="btn" href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const points = {{ points|tojson }};

    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    const markers = [];

    points.forEach((p) => {
      const marker = L.marker([p.y, p.x]).addTo(map);
      markers.push(marker);

      const html = `
        <div style="font-family: system-ui; font-size: 14px; line-height: 1.3">
          <div style="font-weight: 800; margin-bottom: 6px;">${p.adresse || ''}</div>
          <div style="color: #444; margin-bottom: 6px;">
            ${p.city || ''} ${p.zipcode || ''}
          </div>
          <div><b>Nom:</b> ${p.nom || ''}</div>
          <div><b>Email:</b> ${p.email || ''}</div>
          <div><b>Tél:</b> ${p.telephone || ''}</div>
          <div><b>Prix:</b> ${p.prix ?? ''}</div>
          <div style="margin-top: 6px; color:#555">${p.description || ''}</div>
        </div>
      `;

      marker.bindPopup(html);
    });

    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    } else {
      map.setView([46.5, 2.5], 6);
    }
  </script>
</body>
</html>
