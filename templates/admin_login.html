<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Connexion</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#eaf0ff;padding:28px}
    .card{width:min(520px,100%);border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);border-radius:18px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.35)}
    label{display:block;font-weight:800;margin-bottom:8px}
    input{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.10);color:#eaf0ff}
    button{margin-top:14px;width:100%;padding:12px;border-radius:14px;border:0;background:linear-gradient(135deg,#7c5cff,#22c55e);color:#0b1220;font-weight:900;cursor:pointer}
    .error{margin:0 0 12px;padding:10px 12px;border-radius:14px;border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.12)}
    .muted{color:rgba(234,240,255,.75);font-size:13px;line-height:1.45}
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 10px">Admin</h1>
    <p class="muted" style="margin:0 0 14px">Entrez le mot de passe admin.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('admin_login') }}">
      <label for="password">Mot de passe</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Se connecter</button>
    </form>
  </div>
</body>
</html>
