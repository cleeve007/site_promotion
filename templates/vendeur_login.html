<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion vendeur</title>
</head>
<body>

    <h1>Connexion vendeur</h1>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        Email :<br>
        <input type="email" name="email" required><br><br>

        Mot de passe :<br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Se connecter</button>
    </form>

    <p><a href="{{ url_for('vendeur_register') }}">Créer un compte</a></p>

</body>
</html>
